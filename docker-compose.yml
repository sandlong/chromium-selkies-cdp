services:
  brave-vnc-cdp:
    build: .
    container_name: brave-vnc-cdp
    ports:
      - "8080:8080"   # noVNC web UI
      - "5900:5900"   # raw VNC
      - "9222:9222"   # Chrome DevTools Protocol
    environment:
      TZ: Asia/Singapore
      VNC_PASS: change-me
      VNC_WIDTH: 1440
      VNC_HEIGHT: 900
      VNC_SHARED: "false"
      START_URL: https://example.com
      BRAVE_NO_SANDBOX: "true"
      TAB_CLEANUP_INTERVAL_SEC: 21600
      TAB_CLEANUP_KEEP_BLANK: "true"
      DAILY_RESTART_AT: "04:00"
      # BRAVE_ARGS: "--disable-gpu"
    volumes:
      - brave-data:/data
    restart: always # Important for DAILY_RESTART_AT to work correctly

volumes:
  brave-data:
